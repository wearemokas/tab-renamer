<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Renamer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* rounded popup window */
    html {
      border-radius: 22px;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 320px;
      background:
        radial-gradient(ellipse at 10% 0%,   rgba(180,220,255,0.95) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%,  rgba(190,170,255,0.85) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%,   rgba(140,210,255,0.7)  0%, transparent 45%),
        linear-gradient(160deg, #e8f5ff 0%, #ddeeff 50%, #e4dcff 100%);
      color: #0f1e2e;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }

    /* ── glass mixin ── */
    .g {
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.72);
    }

    /* ── HEADER ── */
    .header {
      padding: 16px 16px 13px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .logo {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #5ab4ff 0%, #a07aff 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(90,180,255,0.45), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .htext-main { font-size: 14px; font-weight: 700; color: #0a1a2e; letter-spacing: -0.3px; }
    .htext-sub  { font-size: 11px; color: #7098b4; margin-top: 1px; }

    /* ── BODY ── */
    .body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    /* current title */
    .card-current {
      border-radius: 14px;
      padding: 10px 13px;
      display: flex; align-items: center; gap: 9px;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #b8d4ea; flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.on {
      background: #4db8ff;
      box-shadow: 0 0 0 3px rgba(77,184,255,.22);
      animation: glow 2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 3px rgba(77,184,255,.22); }
      50%      { box-shadow: 0 0 0 6px rgba(77,184,255,.08); }
    }

    .ct-label { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #8aafca; }
    .ct-value { font-size: 12px; font-weight: 600; color: #0e1e2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px; margin-top: 1px; }

    /* input zone */
    .field-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: #7a9db8; padding-left: 2px; margin-bottom: 5px;
    }

    .input-row { display: flex; gap: 7px; }

    input[type=text] {
      flex: 1;
      background: rgba(255,255,255,0.62);
      border: 1.5px solid rgba(255,255,255,0.85);
      border-radius: 11px;
      color: #0a1a2e;
      font-size: 13px; font-family: inherit; font-weight: 500;
      padding: 9px 13px;
      outline: none;
      box-shadow: 0 1px 6px rgba(90,150,200,.1), inset 0 1px 0 rgba(255,255,255,.9);
      transition: border-color .18s, box-shadow .18s;
    }
    input[type=text]::placeholder { color: #aac4d8; }
    input[type=text]:focus {
      border-color: rgba(90,180,255,.75);
      box-shadow: 0 0 0 3.5px rgba(90,180,255,.16), inset 0 1px 0 rgba(255,255,255,.9);
      background: rgba(255,255,255,.82);
    }

    .btn-save {
      background: linear-gradient(135deg, #5ab4ff 0%, #8a78ff 100%);
      color: #fff;
      border: none; border-radius: 11px;
      padding: 9px 17px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 3px 12px rgba(90,180,255,.4), inset 0 1px 0 rgba(255,255,255,.3);
      transition: transform .1s, box-shadow .1s;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(90,180,255,.5), inset 0 1px 0 rgba(255,255,255,.3); }
    .btn-save:active { transform: scale(.96); }

    .bot-row { display: flex; align-items: center; justify-content: space-between; min-height: 28px; }

    .status { font-size: 11px; font-weight: 500; opacity: 0; transition: opacity .25s; }
    .status.visible { opacity: 1; }
    .status.ok  { color: #3abf80; }
    .status.err { color: #e05555; }

    .btn-ghost {
      background: rgba(255,255,255,.45);
      border: 1.5px solid rgba(255,255,255,.75);
      color: #6a90aa; border-radius: 9px;
      padding: 6px 12px; font-size: 11px; font-weight: 500; font-family: inherit;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.7); color: #3a6a88; }

    /* lock */
    .card-lock {
      border-radius: 14px;
      padding: 10px 13px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }

    .lock-left { display: flex; align-items: center; gap: 9px; }

    .lock-box {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(180,220,255,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
      transition: background .2s;
    }
    .lock-box.on { background: rgba(90,180,255,.22); box-shadow: 0 0 0 2px rgba(90,180,255,.3), inset 0 1px 0 rgba(255,255,255,.8); }

    .lock-t { font-size: 12px; font-weight: 600; color: #0e1e2e; }
    .lock-d { font-size: 10px; color: #7a9eb8; margin-top: 1px; }

    /* toggle */
    .tog { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .tog input { opacity:0; width:0; height:0; }
    .knob {
      position: absolute; inset: 0;
      background: rgba(160,200,225,.5);
      border: 1.5px solid rgba(255,255,255,.75);
      border-radius: 20px; cursor: pointer;
      transition: background .2s;
      box-shadow: inset 0 1px 3px rgba(90,140,170,.15);
    }
    .knob::before {
      content:''; position: absolute;
      width:14px; height:14px; left:2px; top:2px;
      background:#fff; border-radius:50%;
      box-shadow: 0 1px 4px rgba(80,130,160,.3);
      transition: transform .2s;
    }
    .tog input:checked + .knob { background: linear-gradient(135deg,#5ab4ff,#8a78ff); border-color: rgba(90,180,255,.4); }
    .tog input:checked + .knob::before { transform: translateX(16px); }

    /* divider */
    .div { height: 1px; background: rgba(255,255,255,.5); }

    /* saved */
    .sec-row { display:flex; align-items:center; justify-content:space-between; padding: 0 2px; }
    .sec-t { font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:#7a9db8; }
    .sec-n {
      font-size:10px; font-weight:600; color:#6a8eaa;
      background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.8);
      border-radius:10px; padding:1px 8px;
    }

    .list { max-height: 120px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
    .list::-webkit-scrollbar { width:3px; }
    .list::-webkit-scrollbar-thumb { background:rgba(140,185,215,.35); border-radius:3px; }

    .item {
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      padding:8px 11px;
      background:rgba(255,255,255,.42);
      border:1px solid rgba(255,255,255,.72);
      border-radius:11px;
      transition: background .15s;
    }
    .item:hover { background:rgba(255,255,255,.62); }
    .item-left { overflow:hidden; flex:1; }
    .item-name { font-size:12px; font-weight:600; color:#0e1e2e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-url  { font-size:10px; color:#8aafc4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

    .xbtn {
      background:rgba(220,90,90,.1); border:1px solid rgba(220,90,90,.12);
      color:rgba(200,70,70,.45); cursor:pointer;
      width:20px; height:20px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; flex-shrink:0;
      transition: background .15s, color .15s;
    }
    .xbtn:hover { background:rgba(220,70,70,.18); color:#cc4444; }

    .empty { font-size:12px; color:#a0bece; text-align:center; padding:14px 0; font-style:italic; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">✏️</div>
    <div>
      <div class="htext-main">Tab Renamer</div>
      <div class="htext-sub">Rinomina qualsiasi tab</div>
    </div>
  </div>

  <div class="body">

    <div class="g card-current">
      <div class="dot" id="dot"></div>
      <div style="overflow:hidden">
        <div class="ct-label">Titolo attuale</div>
        <div class="ct-value" id="currentTitle">Caricamento…</div>
      </div>
    </div>

    <div>
      <div class="field-lbl">Nuovo nome</div>
      <div class="input-row">
        <input type="text" id="newName" placeholder="es. Dashboard lavoro…" autocomplete="off" />
        <button class="btn-save" id="renameBtn">Salva</button>
      </div>
    </div>

    <div class="bot-row">
      <div class="status" id="status"></div>
      <button class="btn-ghost" id="resetBtn">↺ Ripristina</button>
    </div>

    <div class="g card-lock" id="lockRow" style="display:none">
      <div class="lock-left">
        <div class="lock-box" id="lockBox"><span id="lockIcon">🔓</span></div>
        <div>
          <div class="lock-t">Blocca titolo</div>
          <div class="lock-d">Impedisce alla pagina di sovrascrivere</div>
        </div>
      </div>
      <label class="tog">
        <input type="checkbox" id="lockToggle" />
        <span class="knob"></span>
      </label>
    </div>

    <div class="div"></div>

    <div class="sec-row">
      <span class="sec-t">Tab rinominate</span>
      <span class="sec-n" id="savedCount">0</span>
    </div>

    <div class="list" id="savedList">
      <div class="empty">Nessuna tab rinominata</div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
