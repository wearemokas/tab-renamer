<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Renamer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      border-radius: 20px;
      overflow: hidden;
      width: 320px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      /* azzurrino leggero con leggero blur visivo */
      background: rgba(210, 235, 255, 0.72);
      backdrop-filter: blur(40px) saturate(1.8) brightness(1.05);
      -webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(1.05);
      color: #0d1e2e;
    }

    /* ──────────────────────────────────────
       HEADER
    ────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 15px 15px 12px;
      background: rgba(255,255,255,0.30);
      border-bottom: 1px solid rgba(255,255,255,0.55);
    }

    .logo {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #4ab4ff 0%, #8a72ff 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(74,180,255,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .h-title { font-size: 14px; font-weight: 700; color: #0a1828; letter-spacing: -.3px; }
    .h-sub   { font-size: 11px; color: #6a90aa; margin-top: 1px; }

    /* ──────────────────────────────────────
       BODY
    ────────────────────────────────────── */
    .body { padding: 11px; display: flex; flex-direction: column; gap: 7px; }

    /* glass card base */
    .card {
      background: rgba(255,255,255,0.40);
      border: 1px solid rgba(255,255,255,0.68);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* current title */
    .card-cur {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 13px;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #b8d4ea; flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.on {
      background: #38b6ff;
      box-shadow: 0 0 0 3px rgba(56,182,255,.22);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(56,182,255,.22); }
      50%      { box-shadow: 0 0 0 7px rgba(56,182,255,.07); }
    }

    .cur-lbl { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #80a8c0; }
    .cur-val { font-size: 12px; font-weight: 600; color: #0a1828; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 235px; margin-top: 2px; }

    /* input */
    .field-lbl { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #70a0ba; padding-left: 2px; margin-bottom: 5px; }

    .input-row { display: flex; gap: 7px; }

    input[type=text] {
      flex: 1;
      background: rgba(255,255,255,0.58);
      border: 1.5px solid rgba(255,255,255,0.82);
      border-radius: 11px;
      color: #0a1828;
      font-size: 13px; font-family: inherit; font-weight: 500;
      padding: 9px 13px;
      outline: none;
      box-shadow: 0 1px 4px rgba(80,140,190,.08), inset 0 1px 0 rgba(255,255,255,.85);
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    input::placeholder { color: #a0c4d8; }
    input:focus {
      border-color: rgba(56,182,255,.7);
      background: rgba(255,255,255,.78);
      box-shadow: 0 0 0 3.5px rgba(56,182,255,.14), inset 0 1px 0 rgba(255,255,255,.85);
    }

    .btn-save {
      background: linear-gradient(135deg, #4ab4ff 0%, #8068ff 100%);
      color: #fff; border: none;
      border-radius: 11px;
      padding: 9px 17px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 3px 12px rgba(74,180,255,.38), inset 0 1px 0 rgba(255,255,255,.28);
      transition: transform .1s, box-shadow .1s;
    }
    .btn-save:hover  { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(74,180,255,.48); }
    .btn-save:active { transform: scale(.96); }

    /* bottom row */
    .bot-row { display: flex; align-items: center; justify-content: space-between; min-height: 26px; padding: 0 1px; }

    .status { font-size: 11px; font-weight: 500; opacity: 0; transition: opacity .25s; }
    .status.visible { opacity: 1; }
    .status.ok  { color: #28c070; }
    .status.err { color: #e04848; }

    .btn-ghost {
      background: rgba(255,255,255,.42);
      border: 1.5px solid rgba(255,255,255,.72);
      color: #5a88a0; border-radius: 9px;
      padding: 6px 12px; font-size: 11px; font-weight: 500; font-family: inherit;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.68); color: #2a5878; }

    /* lock */
    .card-lock {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 13px;
    }
    .lock-left { display: flex; align-items: center; gap: 9px; }
    .lock-box {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(180,220,255,.38);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
      transition: background .2s;
    }
    .lock-box.on { background: rgba(56,182,255,.22); box-shadow: 0 0 0 2px rgba(56,182,255,.28); }
    .lock-t { font-size: 12px; font-weight: 600; color: #0a1828; }
    .lock-d { font-size: 10px; color: #7090a8; margin-top: 1px; }

    /* toggle */
    .tog { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .tog input { opacity:0; width:0; height:0; }
    .knob {
      position: absolute; inset: 0;
      background: rgba(150,195,220,.5);
      border: 1.5px solid rgba(255,255,255,.75);
      border-radius: 20px; cursor: pointer;
      box-shadow: inset 0 1px 2px rgba(80,130,160,.15);
      transition: background .2s;
    }
    .knob::before {
      content:''; position: absolute;
      width:14px; height:14px; left:2px; top:2px;
      background:#fff; border-radius:50%;
      box-shadow: 0 1px 4px rgba(60,110,150,.25);
      transition: transform .2s;
    }
    .tog input:checked + .knob { background: linear-gradient(135deg,#4ab4ff,#8068ff); border-color: rgba(74,180,255,.4); }
    .tog input:checked + .knob::before { transform: translateX(16px); }

    /* divider */
    .div { height: 1px; background: rgba(255,255,255,.5); margin: 2px 0; }

    /* section */
    .sec-row { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
    .sec-t { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #70a0b8; }
    .sec-n {
      font-size: 10px; font-weight: 600; color: #5a88a0;
      background: rgba(255,255,255,.52); border: 1px solid rgba(255,255,255,.75);
      border-radius: 10px; padding: 1px 8px;
    }

    /* list */
    .list { max-height: 115px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .list::-webkit-scrollbar { width: 3px; }
    .list::-webkit-scrollbar-thumb { background: rgba(120,180,210,.3); border-radius: 3px; }

    .item {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 11px;
      background: rgba(255,255,255,.38);
      border: 1px solid rgba(255,255,255,.68);
      border-radius: 11px;
      transition: background .15s;
    }
    .item:hover { background: rgba(255,255,255,.58); }
    .item-left { overflow: hidden; flex: 1; }
    .item-name { font-size: 12px; font-weight: 600; color: #0a1828; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-url  { font-size: 10px; color: #7aa0b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .xbtn {
      background: rgba(210,80,80,.1); border: 1px solid rgba(210,80,80,.12);
      color: rgba(190,60,60,.4); cursor: pointer;
      width: 20px; height: 20px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .xbtn:hover { background: rgba(210,70,70,.18); color: #cc3333; }

    .empty { font-size: 12px; color: #90b8cc; text-align: center; padding: 14px 0; font-style: italic; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">✏️</div>
    <div>
      <div class="h-title">Tab Renamer</div>
      <div class="h-sub">Rinomina qualsiasi tab</div>
    </div>
  </div>

  <div class="body">

    <div class="card card-cur">
      <div class="dot" id="dot"></div>
      <div style="overflow:hidden">
        <div class="cur-lbl">Titolo attuale</div>
        <div class="cur-val" id="currentTitle">Caricamento…</div>
      </div>
    </div>

    <div>
      <div class="field-lbl">Nuovo nome</div>
      <div class="input-row">
        <input type="text" id="newName" placeholder="es. Dashboard lavoro…" autocomplete="off" />
        <button class="btn-save" id="renameBtn">Salva</button>
      </div>
    </div>

    <div class="bot-row">
      <div class="status" id="status"></div>
      <button class="btn-ghost" id="resetBtn">↺ Ripristina</button>
    </div>

    <div class="card card-lock" id="lockRow" style="display:none">
      <div class="lock-left">
        <div class="lock-box" id="lockBox"><span id="lockIcon">🔓</span></div>
        <div>
          <div class="lock-t">Blocca titolo</div>
          <div class="lock-d">Impedisce alla pagina di sovrascrivere</div>
        </div>
      </div>
      <label class="tog">
        <input type="checkbox" id="lockToggle" />
        <span class="knob"></span>
      </label>
    </div>

    <div class="div"></div>

    <div class="sec-row">
      <span class="sec-t">Tab rinominate</span>
      <span class="sec-n" id="savedCount">0</span>
    </div>

    <div class="list" id="savedList">
      <div class="empty">Nessuna tab rinominata</div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
