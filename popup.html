<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Renamer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { border-radius: 20px; overflow: hidden; width: 320px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse at 20% 0%,   #1a3a6e 0%, transparent 60%),
        radial-gradient(ellipse at 85% 90%,  #0d2d5e 0%, transparent 55%),
        radial-gradient(ellipse at 70% 5%,   #112244 0%, transparent 50%),
        #07111f;
      color: #e0eeff;
      position: relative;
    }

    /* floating light orbs */
    body::before {
      content: '';
      position: fixed;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(60,130,255,0.18) 0%, transparent 70%);
      top: -50px; right: -40px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(80,160,255,0.12) 0%, transparent 70%);
      bottom: -30px; left: -30px;
      border-radius: 50%;
      pointer-events: none;
    }

    /* ── glass card ── */
    .glass {
      background: rgba(80, 160, 255, 0.10);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(120, 190, 255, 0.22);
      border-radius: 14px;
    }

    /* ── HEADER ── */
    .header {
      display: flex; align-items: center; gap: 11px;
      padding: 15px 15px 13px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(120,180,255,0.15);
    }

    .logo {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, #3a8eff 0%, #6a5eff 100%);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      box-shadow: 0 3px 14px rgba(58,142,255,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .h-title { font-size: 14px; font-weight: 700; color: #e8f4ff; letter-spacing: -.3px; }
    .h-sub   { font-size: 11px; color: #5a90cc; margin-top: 1px; }

    /* ── BODY ── */
    .body { padding: 11px; display: flex; flex-direction: column; gap: 8px; }

    /* current title card */
    .card-cur {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 13px;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: #1e3a5a;
      transition: background .3s, box-shadow .3s;
    }
    .dot.on {
      background: #3a9fff;
      box-shadow: 0 0 0 3px rgba(58,159,255,.25);
      animation: dpulse 2s infinite;
    }
    @keyframes dpulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(58,159,255,.25); }
      50%      { box-shadow: 0 0 0 7px rgba(58,159,255,.07); }
    }

    .cur-lbl { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #4a78a8; }
    .cur-val { font-size: 12px; font-weight: 600; color: #c8e0ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 235px; margin-top: 2px; }

    /* input area */
    .field-lbl { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #4a78a8; padding-left: 2px; margin-bottom: 5px; }

    .input-row { display: flex; gap: 7px; }

    input[type=text] {
      flex: 1;
      background: rgba(40, 100, 180, 0.18);
      border: 1.5px solid rgba(100, 170, 255, 0.28);
      border-radius: 11px;
      color: #deeeff;
      font-size: 13px; font-family: inherit; font-weight: 500;
      padding: 9px 13px;
      outline: none;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.25);
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    input::placeholder { color: #2a5080; }
    input:focus {
      border-color: rgba(58,160,255,.65);
      background: rgba(40, 110, 200, 0.25);
      box-shadow: 0 0 0 3px rgba(58,160,255,.15), inset 0 1px 3px rgba(0,0,0,.2);
    }

    .btn-save {
      background: linear-gradient(135deg, #3a8eff 0%, #6a5eff 100%);
      color: #fff; border: none; border-radius: 11px;
      padding: 9px 17px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 3px 14px rgba(58,142,255,.45), inset 0 1px 0 rgba(255,255,255,.2);
      transition: transform .1s, box-shadow .1s;
    }
    .btn-save:hover  { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(58,142,255,.55); }
    .btn-save:active { transform: scale(.96); }

    /* bottom row */
    .bot-row { display: flex; align-items: center; justify-content: space-between; min-height: 26px; padding: 0 1px; }

    .status { font-size: 11px; font-weight: 500; opacity: 0; transition: opacity .25s; }
    .status.visible { opacity: 1; }
    .status.ok  { color: #38d090; }
    .status.err { color: #ff5555; }

    .btn-ghost {
      background: rgba(60,120,200,.18);
      border: 1.5px solid rgba(80,150,255,.22);
      color: #4a80b8; border-radius: 9px;
      padding: 6px 12px; font-size: 11px; font-weight: 500; font-family: inherit;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-ghost:hover { background: rgba(60,130,220,.28); color: #80b8f0; border-color: rgba(80,160,255,.4); }

    /* lock card */
    .card-lock {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 13px;
    }
    .lock-left { display: flex; align-items: center; gap: 9px; }
    .lock-box {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: rgba(40,90,160,.35);
      border: 1px solid rgba(80,150,255,.2);
      display: flex; align-items: center; justify-content: center; font-size: 13px;
      transition: background .2s, border-color .2s;
    }
    .lock-box.on {
      background: rgba(58,142,255,.22);
      border-color: rgba(58,160,255,.45);
      box-shadow: 0 0 0 2px rgba(58,160,255,.15);
    }
    .lock-t { font-size: 12px; font-weight: 600; color: #c0dcff; }
    .lock-d { font-size: 10px; color: #3a6090; margin-top: 1px; }

    /* toggle */
    .tog { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .tog input { opacity:0; width:0; height:0; }
    .knob {
      position: absolute; inset: 0;
      background: rgba(30,70,130,.6);
      border: 1.5px solid rgba(60,120,200,.35);
      border-radius: 20px; cursor: pointer;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.3);
      transition: background .2s, border-color .2s;
    }
    .knob::before {
      content:''; position: absolute;
      width:14px; height:14px; left:2px; top:2px;
      background: #4a7ab0; border-radius:50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
      transition: transform .2s, background .2s;
    }
    .tog input:checked + .knob { background: linear-gradient(135deg,#3a8eff,#6a5eff); border-color: rgba(58,142,255,.5); }
    .tog input:checked + .knob::before { transform: translateX(16px); background: #fff; }

    /* divider */
    .div { height: 1px; background: rgba(60,120,200,.2); margin: 2px 0; }

    /* section */
    .sec-row { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
    .sec-t { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #3a6090; }
    .sec-n {
      font-size: 10px; font-weight: 600; color: #4a7ab0;
      background: rgba(40,90,160,.25); border: 1px solid rgba(60,130,220,.2);
      border-radius: 10px; padding: 1px 8px;
    }

    /* list */
    .list { max-height: 115px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .list::-webkit-scrollbar { width: 3px; }
    .list::-webkit-scrollbar-thumb { background: rgba(58,130,220,.25); border-radius: 3px; }

    .item {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 11px;
      background: rgba(40,100,180,.12);
      border: 1px solid rgba(80,150,255,.18);
      border-radius: 11px;
      transition: background .15s;
    }
    .item:hover { background: rgba(40,110,200,.22); }
    .item-left { overflow: hidden; flex: 1; }
    .item-name { font-size: 12px; font-weight: 600; color: #c0dcff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-url  { font-size: 10px; color: #2a5888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .xbtn {
      background: rgba(220,60,60,.12); border: 1px solid rgba(220,60,60,.15);
      color: rgba(200,80,80,.4); cursor: pointer;
      width: 20px; height: 20px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .xbtn:hover { background: rgba(220,60,60,.25); color: #ff6060; }

    .empty { font-size: 12px; color: #2a5070; text-align: center; padding: 14px 0; font-style: italic; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">✏️</div>
    <div>
      <div class="h-title">Tab Renamer</div>
      <div class="h-sub">Rinomina qualsiasi tab</div>
    </div>
  </div>

  <div class="body">

    <div class="glass card-cur">
      <div class="dot" id="dot"></div>
      <div style="overflow:hidden">
        <div class="cur-lbl">Titolo attuale</div>
        <div class="cur-val" id="currentTitle">Caricamento…</div>
      </div>
    </div>

    <div>
      <div class="field-lbl">Nuovo nome</div>
      <div class="input-row">
        <input type="text" id="newName" placeholder="es. Dashboard lavoro…" autocomplete="off" />
        <button class="btn-save" id="renameBtn">Salva</button>
      </div>
    </div>

    <div class="bot-row">
      <div class="status" id="status"></div>
      <button class="btn-ghost" id="resetBtn">↺ Ripristina</button>
    </div>

    <div class="glass card-lock" id="lockRow" style="display:none">
      <div class="lock-left">
        <div class="lock-box" id="lockBox"><span id="lockIcon">🔓</span></div>
        <div>
          <div class="lock-t">Blocca titolo</div>
          <div class="lock-d">Impedisce alla pagina di sovrascrivere</div>
        </div>
      </div>
      <label class="tog">
        <input type="checkbox" id="lockToggle" />
        <span class="knob"></span>
      </label>
    </div>

    <div class="div"></div>

    <div class="sec-row">
      <span class="sec-t">Tab rinominate</span>
      <span class="sec-n" id="savedCount">0</span>
    </div>

    <div class="list" id="savedList">
      <div class="empty">Nessuna tab rinominata</div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
